# Fully Preemptible Kernel (Real-Time) - PREEMPT_RT.
#
# Added to the linux-adi build by the meta-custom-bsp linux-adi bbappend when
# LINUX_RT=1 (config.mk). PREEMPT_RT is mainlined as of Linux 6.12 (this BSP's
# kernel) and supported on arm64 (ARCH_SUPPORTS_RT), so selecting it switches the
# preemption-model choice from CONFIG_PREEMPT (the stock low-latency model) to the
# realtime model - no separate -rt patch or recipe is required.
#
# NOTE: in the kernel Kconfig, PREEMPT_RT "depends on EXPERT && ARCH_SUPPORTS_RT".
# arm64 provides ARCH_SUPPORTS_RT, but EXPERT is off by default - and without it
# PREEMPT_RT is HIDDEN, so a bare CONFIG_PREEMPT_RT=y is silently ignored and the
# kernel stays on CONFIG_PREEMPT. We must turn EXPERT on for RT to be selectable.
CONFIG_EXPERT=y
CONFIG_PREEMPT_RT=y
